[general]
auto_validate = true
verbosity = 2

[defaults]
env_file = ".env.prod"
auto_local = false
cascade = false
dry_run = true

[validation]
enabled = true
schema_file = ".env.schema"
strict = false
allow_extra = false

[globals]
priority = "last"

  [globals.env]
  AWS_REGION = "us-east-1"
  EDITOR = "vim"
